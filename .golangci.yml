version: "2"

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close
        - (*archive/zip.ReadCloser).Close
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - (*encoding/json.Encoder).Encode
        - (*github.com/spf13/cobra.Command).MarkFlagRequired
