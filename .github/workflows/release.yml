name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags "${LDFLAGS}" -o lamplight.exe .
          else
            go build -ldflags "${LDFLAGS}" -o lamplight .
          fi

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: tar czf lamplight_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz lamplight

      - name: Package (windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: zip lamplight_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip lamplight.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lamplight-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lamplight_*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum lamplight_* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
